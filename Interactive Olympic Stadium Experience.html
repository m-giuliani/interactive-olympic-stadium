<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Olympic Stadium Experience</title>

    <style>
      :root {
        color-scheme: dark;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05070d;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      /* The renderer canvas is appended here and fills the viewport. */
      #app {
        position: fixed;
        inset: 0;
      }

      #app canvas {
        display: block;
      }

      /* Lightweight loading overlay shown until the first frame renders. */
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #05070d;
        color: #cdd6f4;
        font-size: 0.95rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        z-index: 10;
        transition: opacity 0.6s ease;
      }

      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* Race announcements (countdown / status), shown over the scene. */
      #hud {
        position: fixed;
        top: 6%;
        left: 50%;
        transform: translateX(-50%);
        color: #f8f8ff;
        font-size: clamp(1.4rem, 4vw, 2.6rem);
        font-weight: 700;
        letter-spacing: 0.04em;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
        pointer-events: none;
        z-index: 5;
        opacity: 0;
        transition: opacity 0.25s ease;
      }

      #hud.show {
        opacity: 1;
      }
    </style>

    <!--
      No build step (see CLAUDE.md §5). All libraries are loaded as ES modules
      from a CDN via this import map. What runs locally is byte-for-byte what
      runs on GitHub Pages. Versions are pinned for reproducibility.
    -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
          "tween": "https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@23.1.1/dist/tween.esm.js",
          "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.esm.js"
        }
      }
    </script>
  </head>

  <body>
    <div id="app"></div>
    <div id="loading">Loading stadium…</div>
    <div id="hud"></div>

    <!-- Entry point. Wires together the core modules in src/core/. -->
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
